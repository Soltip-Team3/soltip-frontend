<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SolTip</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #09090b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      width: 280px;
      padding: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo span {
      color: #a855f7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      border: 1px solid #27272a;
      border-radius: 9999px;
      background: #18181b;
      padding: 6px 10px;
      color: #d4d4d8;
      font-size: 12px;
      font-weight: 600;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 9999px;
      padding: 11px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-primary {
      background: #a855f7;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #9333ea;
    }

    .btn-outline {
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      background: transparent;
    }

    .btn-outline:hover {
      border-color: #71717a;
      background: #18181b;
    }

    .footer {
      margin-top: 18px;
      color: #71717a;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Sol<span>Tip</span></div>
    <div class="status"><span class="dot"></span> Active on X</div>
    <div class="buttons">
      <a href="http://localhost:3000" target="_blank" class="btn btn-primary">Open SolTip App</a>
      <a href="http://localhost:3000/dashboard" target="_blank" class="btn btn-outline">Register as Creator</a>
    </div>
    <div class="footer">Solana Devnet &middot; USDC tips</div>
  </div>
</body>
</html>
